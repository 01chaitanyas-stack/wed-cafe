<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer mandala ring -->
  <circle cx="60" cy="60" r="56" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  <circle cx="60" cy="60" r="48" stroke="#C9A84C" stroke-width="0.5" opacity="0.25"/>

  <!-- Eight-petal mandala -->
  <g transform="translate(60,60)">
    <!-- Petal group rotated 8 times -->
    <g>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(45)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(90)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(135)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(180)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(225)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(270)"/>
      <ellipse rx="5" ry="20" cy="-28" fill="#C9A84C" opacity="0.7" transform="rotate(315)"/>
    </g>

    <!-- Inner octagon -->
    <polygon points="0,-16 11.3,-11.3 16,0 11.3,11.3 0,16 -11.3,11.3 -16,0 -11.3,-11.3"
      stroke="#C9A84C" stroke-width="1" fill="rgba(201,168,76,0.1)" opacity="0.8"/>

    <!-- Center gem -->
    <circle r="6" fill="#C9A84C" opacity="0.9"/>
    <circle r="3" fill="#E8C96A"/>

    <!-- Corner stars -->
    <g opacity="0.5">
      <text x="-43" y="-40" fill="#C9A84C" font-size="8">✦</text>
      <text x="35" y="-40" fill="#C9A84C" font-size="8">✦</text>
      <text x="-43" y="48" fill="#C9A84C" font-size="8">✦</text>
      <text x="35" y="48" fill="#C9A84C" font-size="8">✦</text>
    </g>
  </g>

  <!-- Subtle diamond grid overlay -->
  <circle cx="60" cy="60" r="22" stroke="#C9A84C" stroke-width="0.5" fill="none" opacity="0.3"/>
</svg>
